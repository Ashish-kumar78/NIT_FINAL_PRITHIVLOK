services:
  # ── Unified Service: Backend + Frontend (Single URL) ────────
  - type: web
    name: nit-final-prithivlok
    runtime: node
    rootDir: PrithviLok/backend
    buildCommand: |
      npm install
      cd ../frontend_old
      npm install
      npm run build
      # Copy dist to backend for easier serving
      rm -rf ../backend/dist
      cp -r dist ../backend/dist
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: OPENAQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_INFERENCE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: QUIZ_PROVIDER
        value: auto
      - key: OPENAI_QUIZ_MODEL
        value: gpt-4o-mini
      - key: GEMINI_QUIZ_MODEL
        value: gemini-1.5-flash
      - key: QUIZ_NO_REPEAT_SESSIONS
        value: 5
      - key: CLIENT_URL
        value: https://nit-final-prithivlok.onrender.com
      - key: POLYGON_RPC_URL
        value: https://rpc-mumbai.maticvigil.com
      - key: NFT_CONTRACT_ADDRESS
        sync: false
      - key: DEPLOYER_PRIVATE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
